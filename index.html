```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Environmental Management Program Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(
        to bottom,
        #87CEEB 0%,
        #B7E4C7 40%,
        #40916C 100%
    );
}

/* Animated Leaves */

.leaf{
    position:absolute;
    font-size:30px;
    opacity:.35;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }

    to{
        transform:translateY(110vh) rotate(360deg);
    }
}

/* Container */

.container{
    position:relative;
    z-index:10;

    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    color:white;
    margin-bottom:50px;
    text-align:center;

    text-shadow:
    0 0 15px rgba(255,255,255,.5),
    0 0 30px rgba(255,255,255,.3);
}

/* Carousel */

.carousel-wrapper{
    width:92%;
    max-width:1400px;

    position:relative;
    overflow:hidden;
}

.carousel{
    display:flex;
    gap:35px;

    overflow-x:auto;
    scroll-behavior:smooth;

    scrollbar-width:none;

    cursor:grab;
    user-select:none;
}

.carousel::-webkit-scrollbar{
    display:none;
}

.carousel:active{
    cursor:grabbing;
}

/* Water Drop Buttons */

.main-btn{

    min-width:260px;
    height:150px;

    border:none;

    border-radius:
    50% 50% 55% 55% /
    60% 60% 40% 40%;

    position:relative;
    overflow:hidden;

    color:white;
    font-size:20px;
    font-weight:bold;

    cursor:pointer;

    background:
    radial-gradient(
        circle at 30% 25%,
        rgba(255,255,255,.95) 0%,
        rgba(255,255,255,.55) 18%,
        rgba(173,216,230,.45) 45%,
        rgba(0,119,182,.40) 100%
    );

    backdrop-filter:blur(10px);

    box-shadow:
    inset 0 8px 20px rgba(255,255,255,.7),
    inset 0 -10px 25px rgba(0,119,182,.35),
    0 12px 30px rgba(0,0,0,.25);

    transition:.4s;
}

.main-btn::before{

    content:"";

    position:absolute;

    top:12%;
    left:18%;

    width:40%;
    height:22%;

    border-radius:50%;

    background:rgba(255,255,255,.8);

    filter:blur(4px);
}

.main-btn:hover{

    transform:
    translateY(-10px)
    scale(1.05);

    box-shadow:
    inset 0 8px 20px rgba(255,255,255,.8),
    inset 0 -15px 25px rgba(0,119,182,.5),
    0 18px 40px rgba(0,119,182,.45);
}

/* Navigation */

.nav-btn{

    position:absolute;

    top:50%;
    transform:translateY(-50%);

    width:55px;
    height:55px;

    border:none;
    border-radius:50%;

    background:white;

    font-size:24px;
    font-weight:bold;

    cursor:pointer;

    z-index:100;

    box-shadow:0 5px 15px rgba(0,0,0,.25);
}

.left{
    left:10px;
}

.right{
    right:10px;
}

/* Popup */

.popup{

    display:none;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.6);

    justify-content:center;
    align-items:center;

    z-index:999;
}

.popup-content{

    width:90%;
    max-width:750px;

    background:white;

    padding:30px;

    border-radius:20px;

    text-align:center;
}

.popup-content h2{

    color:#2D6A4F;
    margin-bottom:25px;
}

.links{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

    gap:15px;
}

.sheet-btn{

    display:block;

    text-decoration:none;

    background:#2D6A4F;
    color:white;

    padding:15px;

    border-radius:12px;

    transition:.3s;
}

.sheet-btn:hover{

    background:#1B4332;
    transform:translateY(-4px);
}

.close-btn{

    margin-top:20px;

    border:none;

    background:#d62828;
    color:white;

    padding:12px 25px;

    border-radius:10px;

    cursor:pointer;
}

/* Mobile */

@media(max-width:768px){

.main-btn{
    min-width:220px;
    height:130px;
    font-size:18px;
}

h1{
    font-size:24px;
}
}

</style>
</head>
<body>

<div class="leaf" style="left:5%;animation-duration:15s;">🍃</div>
<div class="leaf" style="left:20%;animation-duration:18s;">🍃</div>
<div class="leaf" style="left:35%;animation-duration:12s;">🍃</div>
<div class="leaf" style="left:55%;animation-duration:16s;">🍃</div>
<div class="leaf" style="left:75%;animation-duration:14s;">🍃</div>
<div class="leaf" style="left:90%;animation-duration:17s;">🍃</div>

<div class="container">

<h1>
🌱 Environmental Management Program Dashboard 🌱
</h1>

<div class="carousel-wrapper">

<button class="nav-btn left" onclick="moveLeft()">❮</button>
<button class="nav-btn right" onclick="moveRight()">❯</button>

<div class="carousel" id="carousel">

<button class="main-btn" onclick="openCategory('Watershed Management')">
Watershed Management
</button>

<button class="main-btn" onclick="openCategory('Climate Adaptation')">
Climate Adaptation
</button>

<button class="main-btn" onclick="openCategory('Forest Protection')">
Forest Protection
</button>

<button class="main-btn" onclick="openCategory('Waste Management')">
Waste Management
</button>

<button class="main-btn" onclick="openCategory('Coastal Management')">
Coastal Management
</button>

<button class="main-btn" onclick="openCategory('Biodiversity')">
Biodiversity
</button>

</div>

</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-content">

<h2 id="popupTitle"></h2>

<div class="links" id="sheetLinks"></div>

<button class="close-btn" onclick="closePopup()">
Close
</button>

</div>

</div>

<script>

const categories={

"Watershed Management":[
["Report 1","#"],
["Report 2","#"],
["Report 3","#"]
],

"Climate Adaptation":[
["Plan 1","#"],
["Plan 2","#"],
["Plan 3","#"]
],

"Forest Protection":[
["Forest Monitoring","#"],
["Forest Inventory","#"]
],

"Waste Management":[
["Waste Report","#"],
["MRF Tracker","#"]
],

"Coastal Management":[
["Coastal Report","#"],
["Mangrove Tracker","#"]
],

"Biodiversity":[
["Species Database","#"],
["Habitat Report","#"]
]

};

function openCategory(name){

document.getElementById("popupTitle").innerHTML=name;

let html="";

categories[name].forEach(item=>{

html += `
<a class="sheet-btn" href="${item[1]}" target="_blank">
${item[0]}
</a>
`;

});

document.getElementById("sheetLinks").innerHTML=html;

document.getElementById("popup").style.display="flex";
}

function closePopup(){

document.getElementById("popup").style.display="none";
}

/* Infinite Loop */

const carousel=document.getElementById("carousel");

carousel.innerHTML += carousel.innerHTML;

function moveLeft(){

carousel.scrollBy({
left:-320,
behavior:"smooth"
});

setTimeout(loopCarousel,300);
}

function moveRight(){

carousel.scrollBy({
left:320,
behavior:"smooth"
});

setTimeout(loopCarousel,300);
}

function loopCarousel(){

const half=carousel.scrollWidth/2;

if(carousel.scrollLeft>=half){

carousel.scrollLeft=0;
}

if(carousel.scrollLeft<=0){

carousel.scrollLeft=half;
}
}

/* Drag Desktop */

let isDragging=false;
let startX;
let scrollLeft;

carousel.addEventListener("mousedown",(e)=>{

isDragging=true;
startX=e.pageX;
scrollLeft=carousel.scrollLeft;
});

carousel.addEventListener("mouseup",()=>{

isDragging=false;
});

carousel.addEventListener("mouseleave",()=>{

isDragging=false;
});

carousel.addEventListener("mousemove",(e)=>{

if(!isDragging) return;

e.preventDefault();

const walk=(e.pageX-startX)*2;

carousel.scrollLeft=scrollLeft-walk;

loopCarousel();
});

/* Mobile Swipe */

carousel.addEventListener("touchstart",(e)=>{

startX=e.touches[0].pageX;
scrollLeft=carousel.scrollLeft;
});

carousel.addEventListener("touchmove",(e)=>{

const walk=(e.touches[0].pageX-startX)*2;

carousel.scrollLeft=scrollLeft-walk;

loopCarousel();
});

</script>

</body>
</html>
```
