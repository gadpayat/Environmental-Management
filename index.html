<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Environmental Management Program Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(
        to bottom,
        #87CEEB 0%,
        #B7E4C7 40%,
        #40916C 100%
    );
}

/* ===== Animated Background ===== */

.leaf{
    position:absolute;
    color:rgba(255,255,255,.25);
    font-size:30px;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}

/* ===== Main Container ===== */

.container{
    position:relative;
    z-index:10;
    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    color:white;
    text-shadow:2px 2px 8px rgba(0,0,0,.3);
    margin-bottom:40px;
    text-align:center;
}

/* ===== Carousel ===== */

.carousel-wrapper{
    width:90%;
    max-width:1200px;
    overflow:hidden;
    position:relative;
}

.carousel{
    display:flex;
    gap:30px;
    animation:scroll 18s linear infinite;
}

.carousel:hover{
    animation-play-state:paused;
}

@keyframes scroll{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(-50%);
    }
}

.main-btn{
    min-width:280px;
    height:140px;

    border:none;
    border-radius:20px;

    background:rgba(255,255,255,.15);
    backdrop-filter:blur(8px);

    color:white;
    font-size:22px;
    font-weight:bold;

    cursor:pointer;

    transition:.3s;
    box-shadow:0 8px 25px rgba(0,0,0,.25);
}

.main-btn:hover{
    transform:translateY(-8px) scale(1.05);
    background:rgba(255,255,255,.25);
}

/* ===== Arrow Buttons ===== */

.nav-btn{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    width:50px;
    height:50px;

    border:none;
    border-radius:50%;

    background:white;
    cursor:pointer;
    z-index:100;
    font-size:24px;
    font-weight:bold;
}

.left{
    left:10px;
}

.right{
    right:10px;
}

/* ===== Popup ===== */

.popup{
    display:none;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.6);

    justify-content:center;
    align-items:center;

    z-index:999;
}

.popup-content{
    width:90%;
    max-width:700px;

    background:white;
    padding:30px;
    border-radius:20px;

    text-align:center;
}

.popup-content h2{
    color:#2D6A4F;
    margin-bottom:25px;
}

.links{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.sheet-btn{
    display:block;
    text-decoration:none;

    background:#2D6A4F;
    color:white;

    padding:15px;
    border-radius:12px;
    transition:.3s;
}

.sheet-btn:hover{
    background:#1B4332;
    transform:translateY(-3px);
}

.close-btn{
    margin-top:20px;
    background:#d62828;
    color:white;
    border:none;
    padding:12px 25px;
    border-radius:10px;
    cursor:pointer;
}

/* Mobile */

@media(max-width:768px){

.main-btn{
    min-width:220px;
    height:120px;
    font-size:18px;
}

h1{
    font-size:24px;
}
}
</style>
</head>
<body>

<!-- Animated Leaves -->
<div class="leaf" style="left:10%; animation-duration:15s;">🍃</div>
<div class="leaf" style="left:25%; animation-duration:12s;">🍃</div>
<div class="leaf" style="left:40%; animation-duration:18s;">🍃</div>
<div class="leaf" style="left:60%; animation-duration:14s;">🍃</div>
<div class="leaf" style="left:80%; animation-duration:17s;">🍃</div>
<div class="leaf" style="left:95%; animation-duration:13s;">🍃</div>

<div class="container">

    <h1>🌱 Environmental Management Program Dashboard 🌱</h1>

    <div class="carousel-wrapper">

        <button class="nav-btn left" onclick="moveLeft()">❮</button>
        <button class="nav-btn right" onclick="moveRight()">❯</button>

        <div class="carousel" id="carousel">

            <!-- First Set -->
            <button class="main-btn" onclick="openCategory('Watershed Management')">
                Watershed Management
            </button>

            <button class="main-btn" onclick="openCategory('Climate Adaptation')">
                Climate Adaptation
            </button>

            <button class="main-btn" onclick="openCategory('Forest Protection')">
                Forest Protection
            </button>

            <button class="main-btn" onclick="openCategory('Waste Management')">
                Waste Management
            </button>

            <!-- Duplicate Set for Infinite Effect -->
            <button class="main-btn" onclick="openCategory('Watershed Management')">
                Watershed Management
            </button>

            <button class="main-btn" onclick="openCategory('Climate Adaptation')">
                Climate Adaptation
            </button>

            <button class="main-btn" onclick="openCategory('Forest Protection')">
                Forest Protection
            </button>

            <button class="main-btn" onclick="openCategory('Waste Management')">
                Waste Management
            </button>

        </div>
    </div>
</div>

<!-- Popup -->

<div class="popup" id="popup">
    <div class="popup-content">

        <h2 id="popupTitle"></h2>

        <div class="links" id="sheetLinks"></div>

        <button class="close-btn" onclick="closePopup()">
            Close
        </button>

    </div>
</div>

<script>

const categories = {

"Watershed Management":[
["Watershed Report 1","#"],
["Watershed Report 2","#"],
["Watershed Report 3","#"],
["Watershed Report 4","#"]
],

"Climate Adaptation":[
["Climate Plan 1","#"],
["Climate Plan 2","#"],
["Climate Plan 3","#"],
["Climate Plan 4","#"]
],

"Forest Protection":[
["Forest Monitoring","#"],
["Forest Assessment","#"],
["Forest Report","#"],
["Forest Inventory","#"]
],

"Waste Management":[
["Waste Tracker","#"],
["MRF Report","#"],
["Solid Waste Plan","#"],
["Compliance Report","#"]
]

};

function openCategory(name){

document.getElementById("popupTitle").innerHTML=name;

let html="";

categories[name].forEach(item=>{

html+=`
<a class="sheet-btn" href="${item[1]}" target="_blank">
${item[0]}
</a>
`;

});

document.getElementById("sheetLinks").innerHTML=html;

document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

const carousel=document.getElementById("carousel");

function moveLeft(){
carousel.scrollBy({
left:-300,
behavior:"smooth"
});
}

function moveRight(){
carousel.scrollBy({
left:300,
behavior:"smooth"
});
}

</script>

</body>
</html>
