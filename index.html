<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    background:transparent;
    overflow:auto;
}

.container{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px 20px 100px;
}

h1{
    color:white;
    text-align:center;
    margin-bottom:60px;
    font-size:60px;
    text-shadow:
    0 0 15px rgba(255,255,255,.6),
    0 0 30px rgba(255,255,255,.4);
}

/* SECTION TITLES */

.kkb-title,
.pcrp-title{
    padding:12px 40px;
    background:rgba(0,120,60,.25);
    color:white;
    font-size:32px;
    font-weight:700;
    border-radius:15px;
    margin-bottom:35px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.kkb-section,
.pcrp-section{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom:80px;
}

/* BUTTON LAYOUT */

.button-grid,
.pcrp-grid{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap:40px;
    flex-wrap:wrap;
}

.button-card{
    display:flex;
    flex-direction:column;
    align-items:center;
}

/* WATER BUTTONS */

.main-btn{
    width:220px;
    height:220px;
    border:none;
    border-radius:50%;
    cursor:pointer;

    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;

    color:#035c06;
    font-size:25px;
    font-weight:700;

    background:
    radial-gradient(
        circle at 30% 30%,
        rgba(255,255,255,.95) 0%,
        rgba(255,255,255,.75) 15%,
        rgba(173,216,230,.60) 35%,
        rgba(0,180,216,.55) 70%,
        rgba(0,119,182,.75) 100%
    );

    box-shadow:
        inset 0 12px 20px rgba(255,255,255,.8),
        inset 0 -20px 30px rgba(0,119,182,.4),
        0 12px 30px rgba(0,0,0,.25);

    animation:bubbleFloat 5s ease-in-out infinite;
    transition:.4s;
}

.main-btn:hover{
    transform:translateY(-10px) scale(1.08);
}

@keyframes bubbleFloat{
    0%{transform:translateY(0);}
    50%{transform:translateY(-18px);}
    100%{transform:translateY(0);}
}

/* LEAF BUTTONS */

.leaf-btn{
    width:190px;
    height:230px;
    border:none;
    cursor:pointer;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;
    font-size:22px;
    font-weight:700;
    text-align:center;
    padding:20px;

    background:
    linear-gradient(
        135deg,
        #7ed957,
        #2d6a4f
    );

    border-radius:
    0 60% 0 60% /
    0 60% 0 60%;

    box-shadow:
        inset 0 5px 15px rgba(255,255,255,.4),
        0 12px 25px rgba(0,0,0,.25);

    animation:leafFloat 4s ease-in-out infinite;
    transition:.4s;
}

.leaf-btn:hover{
    transform:translateY(-10px) scale(1.05);
}

@keyframes leafFloat{
    0%{transform:translateY(0) rotate(-2deg);}
    50%{transform:translateY(-15px) rotate(2deg);}
    100%{transform:translateY(0) rotate(-2deg);}
}

/* SUB BUTTONS */

.sub-buttons{
    display:none;
    flex-direction:column;
    gap:8px;
    width:220px;
    margin-top:15px;
}

.sub-buttons.show{
    display:flex;
}

.sub-btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;

    background:rgba(255,255,255,.15);
    color:white;
    font-size:14px;
    font-weight:600;

    backdrop-filter:blur(8px);
    transition:.3s;
}

.sub-btn:hover{
    background:rgba(255,255,255,.35);
    transform:translateX(5px);
}

.sub-buttons a{
    text-decoration:none;
}

/* FOOTER */

.footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    padding:12px;
    text-align:center;
    color:white;
    background:rgba(0,0,0,.25);
}

@media(max-width:1000px){

    h1{
        font-size:40px;
    }

    .kkb-title,
    .pcrp-title{
        font-size:24px;
    }

    .main-btn{
        width:160px;
        height:160px;
        font-size:18px;
    }

    .leaf-btn{
        width:140px;
        height:180px;
        font-size:18px;
    }

    .sub-buttons{
        width:160px;
    }
}

</style>

<script>

function toggleMenu(menuId){

    const menus = document.querySelectorAll('.sub-buttons');

    menus.forEach(menu=>{
        if(menu.id !== menuId){
            menu.classList.remove('show');
        }
    });

    document.getElementById(menuId).classList.toggle('show');
}

</script>
