```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Environmental Management Program Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

html,
body{
    width:100%;
    height:100%;
    background:transparent;
    overflow:hidden;
}

/* Main Container */

.container{
    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

/* Title */

h1{
    color:white;
    text-align:center;
    margin-bottom:50px;

    text-shadow:
    0 0 15px rgba(255,255,255,.6),
    0 0 30px rgba(255,255,255,.4);
}

/* Single Row Buttons */

.button-grid{

    display:flex;

    justify-content:center;
    align-items:center;

    gap:40px;

    flex-wrap:nowrap;
}

/* Floating Water Bubble Buttons */

.main-btn{

    width:220px;
    height:220px;

    border:none;
    border-radius:50%;

    position:relative;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    text-align:center;

    color:white;
    font-size:20px;
    font-weight:700;

    cursor:pointer;

    background:
    radial-gradient(
        circle at 30% 30%,
        rgba(255,255,255,.95) 0%,
        rgba(255,255,255,.75) 15%,
        rgba(173,216,230,.60) 35%,
        rgba(0,180,216,.55) 70%,
        rgba(0,119,182,.75) 100%
    );

    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);

    box-shadow:
        inset 0 12px 20px rgba(255,255,255,.8),
        inset 0 -20px 30px rgba(0,119,182,.4),
        0 12px 30px rgba(0,0,0,.25);

    animation:bubbleFloat 5s ease-in-out infinite;

    transition:.4s;
}

.main-btn span{
    position:relative;
    z-index:10;
}

/* Bubble Reflection */

.main-btn::before{

    content:"";

    position:absolute;

    top:18%;
    left:18%;

    width:35%;
    height:18%;

    border-radius:50%;

    background:rgba(255,255,255,.85);

    filter:blur(4px);
}

.main-btn::after{

    content:"";

    position:absolute;

    top:35%;
    right:25%;

    width:20px;
    height:20px;

    border-radius:50%;

    background:rgba(255,255,255,.7);

    filter:blur(2px);
}

/* Floating Animation */

@keyframes bubbleFloat{

    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-18px);
    }

    100%{
        transform:translateY(0);
    }
}

.main-btn:nth-child(2){
    animation-delay:.8s;
}

.main-btn:nth-child(3){
    animation-delay:1.6s;
}

.main-btn:nth-child(4){
    animation-delay:2.4s;
}

.main-btn:hover{

    transform:
    translateY(-10px)
    scale(1.08);

    box-shadow:
        inset 0 15px 25px rgba(255,255,255,.9),
        inset 0 -25px 35px rgba(0,119,182,.5),
        0 20px 40px rgba(0,119,182,.45);
}

/* Popup */

.popup{

    display:none;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.6);

    justify-content:center;
    align-items:center;

    z-index:999;
}

.popup-content{

    width:90%;
    max-width:700px;

    background:white;

    padding:30px;

    border-radius:20px;

    text-align:center;
}

.popup-content h2{

    color:#2D6A4F;
    margin-bottom:20px;
}

.links{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

    gap:15px;
}

.sheet-btn{

    display:block;

    text-decoration:none;

    background:#2D6A4F;
    color:white;

    padding:15px;

    border-radius:12px;

    transition:.3s;
}

.sheet-btn:hover{

    background:#1B4332;
    transform:translateY(-3px);
}

.close-btn{

    margin-top:20px;

    border:none;

    background:#d62828;
    color:white;

    padding:12px 25px;

    border-radius:10px;

    cursor:pointer;
}

/* Mobile */

@media(max-width:1000px){

.button-grid{

    overflow-x:auto;

    justify-content:flex-start;

    padding:20px;

    width:100%;

    scrollbar-width:none;
}

.button-grid::-webkit-scrollbar{
    display:none;
}

.main-btn{

    width:160px;
    height:160px;

    min-width:160px;

    font-size:15px;
}
}

</style>
</head>
<body>

<div class="container">

<h1>
🌱 Environmental Management Program Dashboard 🌱
</h1>

<div class="button-grid">

<button class="main-btn" onclick="openCategory('Watershed Management')">
<span>Watershed Management</span>
</button>

<button class="main-btn" onclick="openCategory('Climate Adaptation')">
<span>Climate Adaptation</span>
</button>

<button class="main-btn" onclick="openCategory('Forest Protection')">
<span>Forest Protection</span>
</button>

<button class="main-btn" onclick="openCategory('Waste Management')">
<span>Waste Management</span>
</button>

</div>

</div>

<!-- Popup -->

<div class="popup" id="popup">

<div class="popup-content">

<h2 id="popupTitle"></h2>

<div class="links" id="sheetLinks"></div>

<button class="close-btn" onclick="closePopup()">
Close
</button>

</div>

</div>

<script>

const categories = {

"Watershed Management":[
["Watershed Report 1","#"],
["Watershed Report 2","#"],
["Watershed Report 3","#"]
],

"Climate Adaptation":[
["Climate Plan 1","#"],
["Climate Plan 2","#"],
["Climate Plan 3","#"]
],

"Forest Protection":[
["Forest Monitoring","#"],
["Forest Assessment","#"],
["Forest Inventory","#"]
],

"Waste Management":[
["Waste Tracker","#"],
["MRF Report","#"],
["Compliance Report","#"]
]

};

function openCategory(name){

document.getElementById("popupTitle").innerText=name;

let html="";

categories[name].forEach(item=>{

html += `
<a class="sheet-btn" href="${item[1]}" target="_blank">
${item[0]}
</a>
`;

});

document.getElementById("sheetLinks").innerHTML=html;

document.getElementById("popup").style.display="flex";
}

function closePopup(){

document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
```
