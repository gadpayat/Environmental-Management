<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Responsive PCRP Layout</title>
<style>
body{font-family:Arial,sans-serif;background:#2f3b46;color:#fff;margin:40px}
.button-grid{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:nowrap;
overflow-x:auto;
}
.pcrp-grid{
display:grid;
grid-template-columns:repeat(6,minmax(140px,190px));
justify-content:center;
column-gap:40px;
row-gap:40px;
}
.item1{grid-column:1}
.item2{grid-column:3}
.item3{grid-column:5}
.item4{grid-column:2;grid-row:2}
.item5{grid-column:4;grid-row:2}
.leaf-btn{width:100%;max-width:190px;height:230px}
@media (max-width:900px){
.pcrp-grid{
grid-template-columns:repeat(2,minmax(140px,190px));
}
.item1,.item2,.item3,.item4,.item5{grid-column:auto;grid-row:auto;}
}
</style>
</head>
<body>
<p>Replace the PCRP CSS in your dashboard with this responsive version.</p>
</body>
</html>
