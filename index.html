<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Environmental Management Program Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    overflow:hidden;
    background:linear-gradient(
        to bottom,
        #87CEEB 0%,
        #B7E4C7 40%,
        #2D6A4F 100%
    );
}

/* Floating Leaves */

.leaf{
    position:absolute;
    font-size:28px;
    opacity:.35;
    animation:fall linear infinite;
}

@keyframes fall{
    from{
        transform:translateY(-100px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}

/* Rising Bubbles */

.bg-bubble{
    position:absolute;
    bottom:-100px;
    border-radius:50%;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(4px);
    animation:rise linear infinite;
}

.b1{
    width:40px;
    height:40px;
    left:10%;
    animation-duration:15s;
}

.b2{
    width:70px;
    height:70px;
    left:30%;
    animation-duration:20s;
}

.b3{
    width:50px;
    height:50px;
    left:55%;
    animation-duration:18s;
}

.b4{
    width:90px;
    height:90px;
    left:80%;
    animation-duration:22s;
}

.b5{
    width:35px;
    height:35px;
    left:92%;
    animation-duration:17s;
}

@keyframes rise{
    from{
        transform:translateY(0);
        opacity:0;
    }

    20%{
        opacity:.5;
    }

    to{
        transform:translateY(-120vh);
        opacity:0;
    }
}

/* Main Container */

.container{
    position:relative;
    z-index:10;

    width:100%;
    height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

h1{
    color:white;
    text-align:center;
    margin-bottom:50px;

    text-shadow:
    0 0 15px rgba(255,255,255,.4),
    0 0 30px rgba(255,255,255,.3);
}

/* Button Grid */

.button-grid{

    display:grid;

    grid-template-columns:
    repeat(2,220px);

    gap:60px;
}

/* Water Bubble Buttons */

.main-btn{

    width:220px;
    height:220px;

    border:none;
    border-radius:50%;

    position:relative;
    overflow:hidden;

    display:flex;
    justify-content:center;
    align-items:center;

    padding:20px;

    color:white;
    font-size:20px;
    font-weight:700;
    text-align:center;

    cursor:pointer;

    background:
    radial-gradient(
        circle at 30% 30%,
        rgba(255,255,255,.95) 0%,
        rgba(255,255,255,.7) 15%,
        rgba(173,216,230,.6) 35%,
        rgba(0,180,216,.55) 70%,
        rgba(0,119,182,.75) 100%
    );

    box-shadow:
    inset 0 12px 20px rgba(255,255,255,.8),
    inset 0 -20px 30px rgba(0,119,182,.4),
    0 12px 30px rgba(0,0,0,.25);

    animation:bubbleFloat 5s ease-in-out infinite;

    transition:.4s;
}

.main-btn span{
    position:relative;
    z-index:10;
}

.main-btn::before{
    content:"";

    position:absolute;

    top:18%;
    left:18%;

    width:35%;
    height:18%;

    border-radius:50%;
    background:rgba(255,255,255,.85);

    filter:blur(4px);
}

.main-btn::after{
    content:"";

    position:absolute;

    top:35%;
    right:25%;

    width:20px;
    height:20px;

    border-radius:50%;
    background:rgba(255,255,255,.7);

    filter:blur(2px);
}

.main-btn:nth-child(2){
    animation-delay:.8s;
}

.main-btn:nth-child(3){
    animation-delay:1.6s;
}

.main-btn:nth-child(4){
    animation-delay:2.4s;
}

@keyframes bubbleFloat{
    0%{
        transform:translateY(0);
    }

    50%{
        transform:translateY(-18px);
    }

    100%{
        transform:translateY(0);
    }
}

.main-btn:hover{
    transform:scale(1.08);

    box-shadow:
    inset 0 15px 25px rgba(255,255,255,.9),
    inset 0 -25px 35px rgba(0,119,182,.5),
    0 20px 40px rgba(0,119,182,.45);
}

/* Popup */

.popup{
    display:none;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.6);

    justify-content:center;
    align-items:center;

    z-index:999;
}

.popup-content{

    width:90%;
    max-width:700px;

    background:white;
    padding:30px;

    border-radius:20px;

    text-align:center;
}

.popup-content h2{
    color:#2D6A4F;
    margin-bottom:20px;
}

.links{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(180px,1fr));

    gap:15px;
}

.sheet-btn{
    display:block;
    text-decoration:none;

    background:#2D6A4F;
    color:white;

    padding:15px;

    border-radius:12px;
}

.close-btn{

    margin-top:20px;

    border:none;

    background:#d62828;
    color:white;

    padding:12px 25px;

    border-radius:10px;

    cursor:pointer;
}

/* Mobile */

@media(max-width:768px){

.button-grid{
    grid-template-columns:1fr;
    gap:30px;
}

.main-btn{
    width:170px;
    height:170px;
    font-size:16px;
    margin:auto;
}

h1{
    font-size:24px;
}
}

</style>
</head>
<body>

<!-- Leaves -->
<div class="leaf" style="left:5%;animation-duration:15s;">🍃</div>
<div class="leaf" style="left:25%;animation-duration:12s;">🍃</div>
<div class="leaf" style="left:45%;animation-duration:18s;">🍃</div>
<div class="leaf" style="left:65%;animation-duration:14s;">🍃</div>
<div class="leaf" style="left:85%;animation-duration:16s;">🍃</div>

<!-- Bubbles -->
<div class="bg-bubble b1"></div>
<div class="bg-bubble b2"></div>
<div class="bg-bubble b3"></div>
<div class="bg-bubble b4"></div>
<div class="bg-bubble b5"></div>

<div class="container">

<h1>🌱 Environmental Management Program Dashboard 🌱</h1>

<div class="button-grid">

<button class="main-btn" onclick="openCategory('Watershed Management')">
<span>Watershed Management</span>
</button>

<button class="main-btn" onclick="openCategory('Climate Adaptation')">
<span>Climate Adaptation</span>
</button>

<button class="main-btn" onclick="openCategory('Forest Protection')">
<span>Forest Protection</span>
</button>

<button class="main-btn" onclick="openCategory('Waste Management')">
<span>Waste Management</span>
</button>

</div>

</div>

<!-- Popup -->

<div class="popup" id="popup">

<div class="popup-content">

<h2 id="popupTitle"></h2>

<div class="links" id="sheetLinks"></div>

<button class="close-btn" onclick="closePopup()">
Close
</button>

</div>

</div>

<script>

const categories={

"Watershed Management":[
["Spreadsheet 1","#"],
["Spreadsheet 2","#"]
],

"Climate Adaptation":[
["Spreadsheet 1","#"],
["Spreadsheet 2","#"]
],

"Forest Protection":[
["Spreadsheet 1","#"],
["Spreadsheet 2","#"]
],

"Waste Management":[
["Spreadsheet 1","#"],
["Spreadsheet 2","#"]
]

};

function openCategory(name){

document.getElementById("popupTitle").innerText=name;

let html="";

categories[name].forEach(item=>{

html += `
<a class="sheet-btn" href="${item[1]}" target="_blank">
${item[0]}
</a>
`;

});

document.getElementById("sheetLinks").innerHTML=html;

document.getElementById("popup").style.display="flex";
}

function closePopup(){
document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
