<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Environmental Management</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

html,body{
    width:100%;
    height:100%;
    background:transparent;
    overflow:auto;
}

.container{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:40px 20px 100px;
}

h1{
    color:white;
    text-align:center;
    margin-bottom:60px;
    font-size:60px;
    text-shadow:
    0 0 15px rgba(255,255,255,.6),
    0 0 30px rgba(255,255,255,.4);
}

/* WATER BUTTON ROW */

.button-grid{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:40px;
    flex-wrap:wrap;
}

/* WATER BUTTONS */

.main-btn{
    width:220px;
    height:220px;
    border:none;
    border-radius:50%;
    position:relative;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    text-align:center;
    color:#035c06;
    font-size:25px;
    font-weight:700;
    cursor:pointer;

    background:
    radial-gradient(
        circle at 30% 30%,
        rgba(255,255,255,.95) 0%,
        rgba(255,255,255,.75) 15%,
        rgba(173,216,230,.60) 35%,
        rgba(0,180,216,.55) 70%,
        rgba(0,119,182,.75) 100%
    );

    box-shadow:
        inset 0 12px 20px rgba(255,255,255,.8),
        inset 0 -20px 30px rgba(0,119,182,.4),
        0 12px 30px rgba(0,0,0,.25);

    animation:bubbleFloat 5s ease-in-out infinite;
    transition:.4s;
}

.main-btn span{
    position:relative;
    z-index:2;
}

.main-btn::before{
    content:"";
    position:absolute;
    top:18%;
    left:18%;
    width:35%;
    height:18%;
    border-radius:50%;
    background:rgba(255,255,255,.85);
    filter:blur(4px);
}

.main-btn::after{
    content:"";
    position:absolute;
    top:35%;
    right:25%;
    width:20px;
    height:20px;
    border-radius:50%;
    background:rgba(255,255,255,.7);
    filter:blur(2px);
}

@keyframes bubbleFloat{
    0%{transform:translateY(0);}
    50%{transform:translateY(-18px);}
    100%{transform:translateY(0);}
}

.main-btn:hover{
    transform:translateY(-10px) scale(1.08);
}

/* PCRP SECTION */

.pcrp-section{
    margin-top:80px;
    display:flex;
    flex-direction:column;
    align-items:center;
}

.pcrp-title{
    padding:12px 40px;
    background:rgba(0,120,60,.85);
    color:white;
    font-size:32px;
    font-weight:700;
    border-radius:15px;
    margin-bottom:35px;
    box-shadow:0 8px 20px rgba(0,0,0,.25);
}

.pcrp-grid{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:30px;
    flex-wrap:wrap;
}

/* LEAF BUTTONS */

.leaf-btn{
    width:190px;
    height:230px;
    border:none;
    cursor:pointer;
    color:white;
    font-size:22px;
    font-weight:700;
    position:relative;

    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(
        135deg,
        #7ed957,
        #2d6a4f
    );

    border-radius:
    0 60% 0 60% /
    0 60% 0 60%;

    box-shadow:
        inset 0 5px 15px rgba(255,255,255,.4),
        0 12px 25px rgba(0,0,0,.25);

    animation:leafFloat 4s ease-in-out infinite;
    transition:.4s;
}

.leaf-btn::before{
    content:"";
    position:absolute;
    width:4px;
    height:75%;
    background:rgba(255,255,255,.4);
    border-radius:20px;
    transform:rotate(25deg);
}

@keyframes leafFloat{
    0%{
        transform:translateY(0) rotate(-2deg);
    }
    50%{
        transform:translateY(-15px) rotate(2deg);
    }
    100%{
        transform:translateY(0) rotate(-2deg);
    }
}

.leaf-btn:hover{
    transform:translateY(-10px) scale(1.05);
}

.footer{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    padding:12px;
    text-align:center;
    color:white;
    background:rgba(0,0,0,.25);
}

@media(max-width:1000px){

    h1{
        font-size:40px;
    }

    .main-btn{
        width:160px;
        height:160px;
        font-size:16px;
    }

    .leaf-btn{
        width:140px;
        height:180px;
        font-size:18px;
    }
}

</style>
</head>
<body>

<div class="container">

    <h1>Environmental Management</h1>

    <!-- WATER BUTTONS -->

    <div class="button-grid">

        <button class="main-btn">
            <span>Online Trackers</span>
        </button>

        <button class="main-btn">
            <span>Manual & Guidance: MC/DO</span>
        </button>

        <button class="main-btn">
            <span>Presentations</span>
        </button>

        <button class="main-btn">
            <span>Forms & Templates</span>
        </button>

    </div>

    <!-- PCRP SECTION BELOW -->

    <div class="pcrp-section">

        <div class="pcrp-title">
            PCRP (PAGKILOS)
        </div>

        <div class="pcrp-grid">

            <button class="leaf-btn">
                <span>Planning</span>
            </button>

            <button class="leaf-btn">
                <span>Monitoring</span>
            </button>

            <button class="leaf-btn">
                <span>Reports</span>
            </button>

            <button class="leaf-btn">
                <span>Templates</span>
            </button>

        </div>

    </div>

</div>

<footer class="footer">
    🌴 Environmental Management | Developed by Ghilous © 2026
</footer>

</body>
</html>
