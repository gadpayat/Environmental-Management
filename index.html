<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Environmental Safeguard</title>

    <style>
        /* ==========================
           Global
        ========================== */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: transparent;
            overflow: auto;
        }

        /* ==========================
           Layout
        ========================== */

        .container {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px 100px;
        }

        h1 {
            color: #fff;
            text-align: center;
            margin-bottom: 60px;
            font-size: 60px;
            text-shadow:
                0 0 15px rgba(255, 255, 255, 0.6),
                0 0 30px rgba(255, 255, 255, 0.4);
        }

        /* ==========================
           Section Titles
        ========================== */

        .kkb-title,
        .pcrp-title {
            padding: 12px 40px;
            background: rgba(0, 120, 60, 0.25);
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            border-radius: 15px;
            margin-bottom: 35px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.25);
        }

        .kkb-section,
        .pcrp-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 80px;
        }

        /* ==========================
           KKB Grid
        ========================== */

        .button-grid {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 40px;
            flex-wrap: nowrap;
        }

        /* ==========================
           PCRP Grid
        ========================== */

        .pcrp-grid {
            display: grid;
            grid-template-columns: repeat(6, 95px);
            grid-auto-rows: auto;
            justify-content: center;
            column-gap: 0;
            row-gap: 40px;
        }

        .item1 {
            grid-column: 1 / span 2;
            grid-row: 1;
            justify-self: center;
        }

        .item2 {
            grid-column: 3 / span 2;
            grid-row: 1;
            justify-self: center;
        }

        .item3 {
            grid-column: 5 / span 2;
            grid-row: 1;
            justify-self: center;
        }

        .item4 {
            grid-column: 2 / span 2;
            grid-row: 2;
            justify-self: center;
        }

        .item5 {
            grid-column: 4 / span 2;
            grid-row: 2;
            justify-self: center;
        }

        /* ==========================
           Buttons
        ========================== */

        .button-card {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .main-btn {
            width: 220px;
            height: 220px;
            border: none;
            border-radius: 50%;
        }

        .leaf-btn {
            width: 190px;
            height: 230px;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 20px;

            border: none;
            border-radius: 0 60% 0 60% / 0 60% 0 60%;

            color: #fff;
            font-size: 22px;
            font-weight: 700;
            text-align: center;

            background: linear-gradient(135deg, #7ed957, #2d6a4f);

            box-shadow:
                inset 0 5px 15px rgba(255, 255, 255, 0.4),
                0 12px 25px rgba(0, 0, 0, 0.25);

            animation: leafFloat 4s ease-in-out infinite;
            transition: 0.4s;
        }

        .leaf-btn:hover {
            transform: translateY(-10px) scale(1.05);
        }

        /* ==========================
           Animations
        ========================== */

        @keyframes leafFloat {
            0% {
                transform: translateY(0) rotate(-2deg);
            }

            50% {
                transform: translateY(-15px) rotate(2deg);
            }

            100% {
                transform: translateY(0) rotate(-2deg);
            }
        }
    </style>

</head>

<body>

    <div class="container">

        <h1>Environmental Safeguard</h1>

        <!-- ==========================
             KKB-CDD
        ========================== -->

        <div class="kkb-section">

            <div class="kkb-title">
                KKB-CDD
            </div>

            <div class="button-grid">

                <div class="button-card">
                    <button class="main-btn">
                        Online Tracker
                    </button>
                </div>

                <div class="button-card">
                    <button class="main-btn">
                        Manual &amp; Guidance
                    </button>
                </div>

                <div class="button-card">
                    <button class="main-btn">
                        Presentations
                    </button>
                </div>

                <div class="button-card">
                    <button class="main-btn">
                        Forms &amp; Templates
                    </button>
                </div>

            </div>

        </div>

        <!-- ==========================
             PCRP (PAGKILOS)
        ========================== -->

        <div class="pcrp-section">

            <div class="pcrp-title">
                PCRP (PAGKILOS)
            </div>

            <div class="pcrp-grid">

                <div class="button-card item1">
                    <button class="leaf-btn">
                        Online Tracker
                    </button>
                </div>

                <div class="button-card item2">
                    <button class="leaf-btn">
                        Manual &amp; Guidance
                    </button>
                </div>

                <div class="button-card item3">
                    <button class="leaf-btn">
                        Presentations
                    </button>
                </div>

                <div class="button-card item4">
                    <button class="leaf-btn">
                        Forms &amp; Templates
                    </button>
                </div>

                <div class="button-card item5">
                    <button class="leaf-btn">
                        Memo, MOA &amp; Others
                    </button>
                </div>

            </div>

        </div>

    </div>

</body>

</html>
