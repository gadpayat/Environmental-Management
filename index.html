<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Environmental Management Program Portal</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
}

/* ===========================
   FULLSCREEN FOREST BACKGROUND
=========================== */

.background{
    position:fixed;
    inset:0;
    background:url('assets/forest-bg.jpg') center center/cover no-repeat;
    z-index:-10;
}

.background::before{
    content:'';
    position:absolute;
    inset:0;
    background:rgba(0,50,20,0.35);
}

/* ===========================
   CLOUDS
=========================== */

.cloud{
    position:absolute;
    opacity:.7;
    pointer-events:none;
}

.cloud1{
    width:250px;
    top:50px;
    animation:cloudMove 55s linear infinite;
}

.cloud2{
    width:180px;
    top:150px;
    animation:cloudMove 70s linear infinite;
}

.cloud3{
    width:220px;
    top:260px;
    animation:cloudMove 90s linear infinite;
}

@keyframes cloudMove{
    from{
        transform:translateX(-350px);
    }
    to{
        transform:translateX(calc(100vw + 500px));
    }
}

/* ===========================
   BIRDS
=========================== */

.bird{
    position:absolute;
    width:70px;
    opacity:.8;
}

.bird1{
    top:120px;
    animation:birdFly 20s linear infinite;
}

.bird2{
    top:180px;
    animation:birdFly 28s linear infinite;
}

@keyframes birdFly{
    from{
        transform:translateX(-100px);
    }
    to{
        transform:translateX(calc(100vw + 100px));
    }
}

/* ===========================
   LEAVES
=========================== */

.leaf{
    position:absolute;
    width:40px;
    opacity:.7;
    pointer-events:none;
}

.leaf1{
    left:10%;
    animation:leafFall 12s linear infinite;
}

.leaf2{
    left:35%;
    animation:leafFall 16s linear infinite;
}

.leaf3{
    left:60%;
    animation:leafFall 14s linear infinite;
}

.leaf4{
    left:85%;
    animation:leafFall 18s linear infinite;
}

@keyframes leafFall{

    0%{
        transform:translateY(-100px) rotate(0deg);
    }

    100%{
        transform:translateY(120vh) rotate(720deg);
    }
}

/* ===========================
   CONTENT
=========================== */

.container{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.title{
    color:white;
    text-align:center;
    margin-bottom:40px;
}

.title h1{
    font-size:3rem;
    text-shadow:0 0 15px rgba(0,0,0,.6);
}

.title p{
    font-size:1.2rem;
    margin-top:10px;
}

/* ===========================
   MANUAL CAROUSEL
=========================== */

.carousel-wrapper{
    width:95%;
    overflow:hidden;
    cursor:grab;
}

.carousel-wrapper:active{
    cursor:grabbing;
}

.carousel{
    display:flex;
    gap:30px;
    user-select:none;
}

.main-btn{

    min-width:320px;
    height:170px;

    border:none;
    border-radius:25px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(12px);

    color:white;
    font-size:1.3rem;
    font-weight:700;

    cursor:pointer;

    transition:.4s;

    box-shadow:
    0 10px 30px rgba(0,0,0,.3);
}

.main-btn:hover{
    transform:translateY(-8px);
    background:rgba(255,255,255,.25);
}

/* ===========================
   POPUP
=========================== */

.popup{

    display:none;

    position:fixed;
    inset:0;

    background:rgba(0,0,0,.6);

    justify-content:center;
    align-items:center;
}

.popup-content{

    width:90%;
    max-width:700px;

    background:white;

    padding:30px;

    border-radius:25px;
}

.popup-content h2{

    color:#2d6a4f;

    margin-bottom:20px;
}

.links{

    display:grid;

    grid-template-columns:
    repeat(auto-fit,minmax(200px,1fr));

    gap:15px;
}

.sheet-link{

    background:#2d6a4f;

    color:white;

    text-decoration:none;

    padding:15px;

    border-radius:12px;

    text-align:center;
}

.sheet-link:hover{
    background:#1b4332;
}

.close-btn{

    margin-top:20px;

    padding:12px 25px;

    border:none;

    border-radius:10px;

    background:#d62828;

    color:white;

    cursor:pointer;
}

</style>
</head>
<body>

<div class="background">

    <img src="assets/cloud.png" class="cloud cloud1">
    <img src="assets/cloud.png" class="cloud cloud2">
    <img src="assets/cloud.png" class="cloud cloud3">

    <img src="assets/bird.png" class="bird bird1">
    <img src="assets/bird.png" class="bird bird2">

    <img src="assets/leaf.png" class="leaf leaf1">
    <img src="assets/leaf.png" class="leaf leaf2">
    <img src="assets/leaf.png" class="leaf leaf3">
    <img src="assets/leaf.png" class="leaf leaf4">

</div>

<div class="container">

    <div class="title">
        <h1>🌿 Environmental Management Program</h1>
        <p>Monitoring, Reporting and Knowledge Portal</p>
    </div>

    <div class="carousel-wrapper" id="slider">

        <div class="carousel">

            <button class="main-btn" onclick="openPortal('Watershed Management')">
                Watershed Management
            </button>

            <button class="main-btn" onclick="openPortal('Climate Adaptation')">
                Climate Change Adaptation
            </button>

            <button class="main-btn" onclick="openPortal('Biodiversity')">
                Biodiversity Conservation
            </button>

            <button class="main-btn" onclick="openPortal('Waste Management')">
                Solid Waste Management
            </button>

        </div>

    </div>

</div>

<div class="popup" id="popup">

    <div class="popup-content">

        <h2 id="title"></h2>

        <div class="links" id="links"></div>

        <button class="close-btn"
        onclick="closePortal()">
        Close
        </button>

    </div>

</div>

<script>

/* ===================
   MANUAL DRAG CAROUSEL
=================== */

const slider=document.getElementById('slider');

let isDown=false;
let startX;
let scrollLeft;

slider.addEventListener('mousedown',(e)=>{
isDown=true;
startX=e.pageX-slider.offsetLeft;
scrollLeft=slider.scrollLeft;
});

slider.addEventListener('mouseleave',()=>{
isDown=false;
});

slider.addEventListener('mouseup',()=>{
isDown=false;
});

slider.addEventListener('mousemove',(e)=>{

if(!isDown) return;

e.preventDefault();

const x=e.pageX-slider.offsetLeft;

const walk=(x-startX)*2;

slider.scrollLeft=scrollLeft-walk;

});

/* Mobile Swipe */

slider.addEventListener('touchstart',(e)=>{

startX=e.touches[0].pageX;
scrollLeft=slider.scrollLeft;

});

slider.addEventListener('touchmove',(e)=>{

const x=e.touches[0].pageX;

const walk=(x-startX)*2;

slider.scrollLeft=scrollLeft-walk;

});

/* ===================
   POPUP LINKS
=================== */

function openPortal(name){

document.getElementById('title').innerText=name;

let html='';

for(let i=1;i<=6;i++){

html+=`
<a class="sheet-link"
href="#"
target="_blank">
Spreadsheet ${i}
</a>
`;

}

document.getElementById('links').innerHTML=html;

document.getElementById('popup').style.display='flex';
}

function closePortal(){

document.getElementById('popup').style.display='none';

}

</script>

</body>
</html>
